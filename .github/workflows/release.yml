name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Parse tag and sync package version
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $version = $tag -replace '^[vV]', ''
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Invalid tag: $tag"
          }
          "TAG=$tag" >> $env:GITHUB_ENV
          "VERSION=$version" >> $env:GITHUB_ENV
          npm version $version --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        env:
          # CI 无代码签名证书，跳过签名避免 electron-builder 失败
          CSC_IDENTITY_AUTO_DISCOVERY: false
        # 仅打包 exe，Release 由下一步 action-gh-release 上传（避免 electron-builder 要求 GH_TOKEN）
        run: npm run build && npx electron-builder --win --publish never

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GH_TOKEN: ${{ secrets.NIOZY_TOKEN }}
        with:
          name: NioZy ${{ env.TAG }}
          files: release/*.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
