appId: com.niozy.app
afterPack: scripts/after-pack.mjs
productName: NioZy
copyright: Copyright © NioZy
extraMetadata:
  main: out/main/index.mjs
  author:
    name: Lander1037
    email: mail@renj.io
  homepage: https://github.com/Landers1037/NioZy
  repository:
    type: git
    url: https://github.com/Landers1037/NioZy.git
directories:
  buildResources: build
  output: release
compression: maximum   # 或 store / normal  
files:
  - out/**/*
  - package.json
  - '!node_modules/@copilotkit/**'
  - '!node_modules/sass/**'
  - '!node_modules/@excalidraw/excalidraw/dist/dev/**'
  # 离线字体已由 vendor-excalidraw-fonts 复制到 out/renderer/excalidraw-fonts（见 index.html EXCALIDRAW_ASSET_PATH）
  - '!node_modules/@excalidraw/excalidraw/dist/prod/fonts/**'
  - '!node_modules/@jitl/quickjs-wasmfile-debug-*/**'
  - '!node_modules/@jitl/quickjs-wasmfile-release-asyncify/**'
  - '!out/**/*.map'
  - '!**/{.DS_Store,thumbs.db}'
  - '!**/{test,tests,__tests__,docs,doc,example,examples,demo}/**'
  - '!**/*.{md,markdown,map,d.ts,d.mts}'
  # node-pty 源码与构建脚本无需进入产物；原生二进制由 asarUnpack + afterPack 按架构保留
  - '!node_modules/node-pty/{src,deps,scripts,typings}/**'
  - '!node_modules/node-pty/binding.gyp'
asar: true
asarUnpack:
  # 仅解包 node-pty 原生产物目录（JS 留在 asar 内，Electron 会映射到 unpacked 路径）
  - '**/node_modules/node-pty/prebuilds/**'
  - '**/node_modules/node-pty/third_party/**'
  - '**/node_modules/node-pty/build/**'
  - '**/node_modules/font-list/**'
  - '**/node_modules/node-screenshots/**'
  - '**/node_modules/node-screenshots-*/**'
  - '**/fonts/**'
  - '**/*.{ttf,otf,woff,woff2}'
  - '**/node_modules/sql.js/**'
  - out/main/scripts/**
# node-pty 自带预编译产物；避免本机缺少 Python distutils 时 node-gyp 失败
npmRebuild: false
extraResources:
  - from: build/icon.ico
    to: icon.ico
  # PowerShell 无法读取 app.asar 内脚本，须放在 resources 根目录
  - from: out/main/scripts/shell-integration.ps1
    to: shell-integration.ps1
  - from: out/main/scripts/omp-bootstrap.ps1
    to: omp-bootstrap.ps1
  - from: out/main/scripts/bin
    to: niozy-bin
    filter:
      - '**/*'
  - from: vendor/oh-my-posh
    to: oh-my-posh
    filter:
      - '**/*'
  - from: vendor/posh-git
    to: posh-git
    filter:
      - '**/*'
win:
  target:
    - nsis
  icon: build/icon.ico
  artifactName: '${productName}-${version}-${arch}.${ext}'
  # 本地打包无需签名；避免下载 winCodeSign（解压含 symlink，无管理员/开发者模式会失败）
  signAndEditExecutable: true
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
