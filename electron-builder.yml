appId: com.niozy.app
productName: NioZy
copyright: Copyright © NioZy
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - package.json
  - '!out/**/*.map'
  - '!**/{.DS_Store,thumbs.db}'
  - '!**/{test,tests,__tests__,docs,doc,example,examples}/**'
  - '!**/*.{md,markdown,map}'
asar: true
asarUnpack:
  - '**/node_modules/node-pty/**'
  - '**/node_modules/font-list/**'
  - '**/fonts/**'
  - '**/*.{ttf,otf,woff,woff2}'
  - out/main/scripts/**
# node-pty 自带预编译产物；避免本机缺少 Python distutils 时 node-gyp 失败
npmRebuild: false
extraResources:
  - from: build/icon.ico
    to: icon.ico
  # PowerShell 无法读取 app.asar 内脚本，须放在 resources 根目录
  - from: out/main/scripts/shell-integration.ps1
    to: shell-integration.ps1
win:
  target:
    - nsis
  icon: build/icon.ico
  artifactName: '${productName}-${version}-${arch}.${ext}'
  # 本地打包无需签名；避免下载 winCodeSign（解压含 symlink，无管理员/开发者模式会失败）
  signAndEditExecutable: true
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
